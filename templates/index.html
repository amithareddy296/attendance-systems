<!DOCTYPE html>
<html>

<head>

    <title>Attendance Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- Header -->

    <div class="header">

        <h2>SJC Institute of Technology</h2>

        <p>Attendance Management System</p>

    </div>

    <!-- Dashboard Title -->

    <div class="container">

        <h1 class="main-title">
            Attendance Management System
        </h1>

        <div class="row justify-content-center g-4">

            <!-- Register -->

            <div class="col-lg-4 col-md-6">

                <div class="card-box">

                    <h2>Register</h2>

                    <p>Add New Students</p>

                    <a href="/register" class="btn btn-primary">
                        Open
                    </a>

                </div>

            </div>

            <!-- Students -->

            <div class="col-lg-4 col-md-6">

                <div class="card-box">

                    <h2>Students</h2>

                    <p>View Registered Students</p>

                    <a href="/students" class="btn btn-success">
                        Open
                    </a>

                </div>

            </div>

            <!-- Attendance -->

            <div class="col-lg-4 col-md-6">

                <div class="card-box">

                    <h2>Attendance</h2>

                    <p>Mark Daily Attendance</p>

                    <a href="/attendance" class="btn btn-warning">
                        Open
                    </a>

                </div>

            </div>

            <!-- Reports -->

            <div class="col-lg-4 col-md-6">

                <div class="card-box">

                    <h2>Reports</h2>

                    <p>Attendance Reports</p>

                    <a href="/reports" class="btn btn-info">
                        Open
                    </a>

                </div>

            </div>

            <!-- Admin -->

            <div class="col-lg-4 col-md-6">

                <div class="card-box">

                    <h2>Admin</h2>

                    <p>View Admin Dashboard</p>

                    <a href="/admin" class="btn btn-danger">
                        Open
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
